services:
  propsai-backend:
    build: .
    container_name: propsai-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - propsai-data:/app/app/data
      - ./kalshi.key:/app/kalshi.key:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  propsai-frontend:
    build: ../frontend
    container_name: propsai-frontend
    restart: unless-stopped
    network_mode: host
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

volumes:
  propsai-data:
    driver: local
